name: Build Cardputer Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

env:
  PIO_ENV: m5stack-stamps3
  ESP_CHIP: esp32s3
  FLASH_MODE: qio
  FLASH_FREQ: 80m
  FLASH_SIZE: 8MB

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO and esptool
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Build firmware
        run: pio run -e "$PIO_ENV"

      - name: Prepare artifacts
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR=".pio/build/$PIO_ENV"
          mkdir -p dist/launcher dist/fullflash dist/split dist/meta

          cp "$BUILD_DIR/firmware.bin" dist/launcher/cardputer-launcher.bin
          cp "$BUILD_DIR/firmware.bin" dist/split/firmware.bin
          cp "$BUILD_DIR/bootloader.bin" dist/split/bootloader.bin
          cp "$BUILD_DIR/partitions.bin" dist/split/partitions.bin

          MAGIC="$(xxd -p -l 1 "$BUILD_DIR/firmware.bin")"
          if [[ "$MAGIC" != "e9" ]]; then
            echo "Expected firmware.bin to begin with ESP image magic e9, got: $MAGIC" >&2
            exit 1
          fi

          BOOT_APP0="$(find "$HOME/.platformio/packages" -path '*/tools/partitions/boot_app0.bin' | head -n 1)"
          if [[ -z "$BOOT_APP0" ]]; then
            echo "Could not locate boot_app0.bin under ~/.platformio/packages" >&2
            exit 1
          fi

          echo "Using boot_app0: $BOOT_APP0"
          cp "$BOOT_APP0" dist/meta/boot_app0.bin

          python -m esptool --chip "$ESP_CHIP" merge-bin \
            -o dist/fullflash/cardputer-fullflash.bin \
            --flash-mode "$FLASH_MODE" \
            --flash-freq "$FLASH_FREQ" \
            --flash-size "$FLASH_SIZE" \
            0x1000 "$BUILD_DIR/bootloader.bin" \
            0x8000 "$BUILD_DIR/partitions.bin" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$BUILD_DIR/firmware.bin"

          python -m esptool --chip "$ESP_CHIP" image-info "$BUILD_DIR/firmware.bin" > dist/meta/firmware-image-info.txt
          python -m esptool --chip "$ESP_CHIP" image-info "$BUILD_DIR/bootloader.bin" > dist/meta/bootloader-image-info.txt

          cat > dist/meta/FLASHING.txt <<EOF
          Cardputer artifact guide
          =======================

          1) M5Apps / M5Launcher / WebUI / SD install
             Use: launcher/cardputer-launcher.bin
             Notes:
             - This is the regular app image built by PlatformIO.
             - Install it from Launcher as an app/update binary.
             - Do NOT use cardputer-fullflash.bin inside Launcher.

          2) Direct USB flashing (esptool / web flasher / desktop flasher)
             Use: fullflash/cardputer-fullflash.bin
             Address: 0x0
             Notes:
             - This is the merged full-flash image containing bootloader,
               partition table, boot_app0, and the application.

          3) Split binaries
             Use files from split/ only if you specifically want the separate
             bootloader / partitions / firmware pieces for debugging or a custom
             flashing flow.
          EOF

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardputer-launcher
          path: |
            dist/launcher/cardputer-launcher.bin
            dist/meta/FLASHING.txt
            dist/meta/firmware-image-info.txt
          retention-days: 1

      - name: Upload full-flash artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardputer-fullflash
          path: |
            dist/fullflash/cardputer-fullflash.bin
            dist/meta/FLASHING.txt
            dist/meta/bootloader-image-info.txt
            dist/meta/firmware-image-info.txt
          retention-days: 1

      - name: Upload split artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardputer-split
          path: |
            dist/split/firmware.bin
            dist/split/bootloader.bin
            dist/split/partitions.bin
            dist/meta/FLASHING.txt
            dist/meta/boot_app0.bin
            dist/meta/bootloader-image-info.txt
            dist/meta/firmware-image-info.txt
          retention-days: 1

name: Build Cardputer Firmware

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PIO_ENV: m5stack-stamps3
      ESP_CHIP: esp32s3
      FLASH_FREQ: 80m
      FLASH_SIZE: 8MB
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini', '**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Build firmware
        run: |
          pio run -e "$PIO_ENV"

      - name: Collect firmware files
        run: |
          set -euo pipefail
          BUILD_DIR=".pio/build/${PIO_ENV}"
          DIST_DIR="dist"
          mkdir -p "$DIST_DIR"

          cp "$BUILD_DIR/firmware.bin" "$DIST_DIR/firmware.bin"
          cp "$BUILD_DIR/bootloader.bin" "$DIST_DIR/bootloader.bin"
          cp "$BUILD_DIR/partitions.bin" "$DIST_DIR/partitions.bin"
          cp "$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin" "$DIST_DIR/boot_app0.bin"

      - name: Build merged firmware variants
        run: |
          set -euo pipefail
          DIST_DIR="dist"

          # Variant 1: exact board defaults for m5stack-stamps3 (QIO / 80MHz / 8MB)
          python -m esptool \
            --chip "$ESP_CHIP" merge-bin \
            -o "$DIST_DIR/cardputer-merged-qio.bin" \
            --flash-mode qio \
            --flash-freq "$FLASH_FREQ" \
            --flash-size "$FLASH_SIZE" \
            0x1000 "$DIST_DIR/bootloader.bin" \
            0x8000 "$DIST_DIR/partitions.bin" \
            0xe000 "$DIST_DIR/boot_app0.bin" \
            0x10000 "$DIST_DIR/firmware.bin"

          # Variant 2: conservative standalone merged image for launchers / web-style installers
          python -m esptool \
            --chip "$ESP_CHIP" merge-bin \
            -o "$DIST_DIR/cardputer-merged-dio.bin" \
            --flash-mode dio \
            --flash-freq "$FLASH_FREQ" \
            --flash-size "$FLASH_SIZE" \
            0x1000 "$DIST_DIR/bootloader.bin" \
            0x8000 "$DIST_DIR/partitions.bin" \
            0xe000 "$DIST_DIR/boot_app0.bin" \
            0x10000 "$DIST_DIR/firmware.bin"

      - name: Inspect merged images
        run: |
          set -euo pipefail
          python -m esptool --chip "$ESP_CHIP" image-info dist/cardputer-merged-qio.bin | tee dist/image-info-qio.txt
          python -m esptool --chip "$ESP_CHIP" image-info dist/cardputer-merged-dio.bin | tee dist/image-info-dio.txt

      - name: Write flashing instructions
        run: |
          cat > dist/FLASHING.txt <<'EOF'
          Split flash layout:
            0x1000  bootloader.bin
            0x8000  partitions.bin
            0xe000  boot_app0.bin
            0x10000 firmware.bin

          Merged flash layout:
            0x0000  cardputer-merged-qio.bin
            0x0000  cardputer-merged-dio.bin

          Which merged file to try:
          - Try cardputer-merged-dio.bin first for launchers / web-style installers.
          - If you want the exact board-default flash mode, try cardputer-merged-qio.bin.

          Notes:
          - Both merged files are full-flash images and must be flashed at offset 0x0.
          - The split files are the fallback if a launcher dislikes the merged image.
          EOF

      - name: Write checksums
        run: |
          sha256sum dist/cardputer-merged-qio.bin > dist/SHA256SUMS.txt
          sha256sum dist/cardputer-merged-dio.bin >> dist/SHA256SUMS.txt
          sha256sum dist/firmware.bin >> dist/SHA256SUMS.txt
          sha256sum dist/bootloader.bin >> dist/SHA256SUMS.txt
          sha256sum dist/partitions.bin >> dist/SHA256SUMS.txt
          sha256sum dist/boot_app0.bin >> dist/SHA256SUMS.txt

      - name: Upload merged firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardputer-merged-firmware
          path: |
            dist/cardputer-merged-qio.bin
            dist/cardputer-merged-dio.bin
            dist/image-info-qio.txt
            dist/image-info-dio.txt
            dist/FLASHING.txt
            dist/SHA256SUMS.txt
          retention-days: 7

      - name: Upload split firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardputer-split-firmware
          path: |
            dist/firmware.bin
            dist/bootloader.bin
            dist/partitions.bin
            dist/boot_app0.bin
            dist/FLASHING.txt
            dist/SHA256SUMS.txt
          retention-days: 7

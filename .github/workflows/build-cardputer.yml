name: Build Cardputer Firmware

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PIO_ENV: m5stack-stamps3
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini', '**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool

      - name: Build firmware
        run: |
          pio run -e "$PIO_ENV"

      - name: Collect and merge firmware
        run: |
          set -euo pipefail

          BUILD_DIR=".pio/build/${PIO_ENV}"
          DIST_DIR="dist"
          mkdir -p "$DIST_DIR"

          cp "$BUILD_DIR/firmware.bin" "$DIST_DIR/firmware.bin"
          cp "$BUILD_DIR/bootloader.bin" "$DIST_DIR/bootloader.bin"
          cp "$BUILD_DIR/partitions.bin" "$DIST_DIR/partitions.bin"

          if [[ -f "$BUILD_DIR/firmware.merged.bin" ]]; then
            cp "$BUILD_DIR/firmware.merged.bin" "$DIST_DIR/cardputer-merged.bin"
          else
            BOOT_APP0="$(find "$HOME/.platformio/packages" -path '*/tools/partitions/boot_app0.bin' | head -n 1)"

            if [[ -z "$BOOT_APP0" ]]; then
              echo "boot_app0.bin not found in PlatformIO packages"
              exit 1
            fi

            python -m esptool \
              --chip esp32s3 merge-bin \
              -o "$DIST_DIR/cardputer-merged.bin" \
              --flash-mode keep \
              --flash-freq keep \
              --flash-size keep \
              --pad-to-size 8MB \
              0x1000 "$BUILD_DIR/bootloader.bin" \
              0x8000 "$BUILD_DIR/partitions.bin" \
              0xe000 "$BOOT_APP0" \
              0x10000 "$BUILD_DIR/firmware.bin"
          fi

          sha256sum "$DIST_DIR/cardputer-merged.bin" > "$DIST_DIR/SHA256SUMS.txt"
          sha256sum "$DIST_DIR/firmware.bin" >> "$DIST_DIR/SHA256SUMS.txt"
          sha256sum "$DIST_DIR/bootloader.bin" >> "$DIST_DIR/SHA256SUMS.txt"
          sha256sum "$DIST_DIR/partitions.bin" >> "$DIST_DIR/SHA256SUMS.txt"

      - name: Upload merged firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardputer-merged-firmware
          path: |
            dist/cardputer-merged.bin
            dist/SHA256SUMS.txt
          retention-days: 7

      - name: Upload split firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardputer-split-firmware
          path: |
            dist/firmware.bin
            dist/bootloader.bin
            dist/partitions.bin
          retention-days: 7
